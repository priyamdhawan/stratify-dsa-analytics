# Sets Streamlit's OWN theme to the dark surface every chart in this
# app already assumes (transparent plot backgrounds + light-colored
# text/labels). Without this file, the app falls back to whatever
# theme the viewer's browser/Streamlit defaults to - usually a light
# background - which makes the white chart text and white card text
# genuinely hard to read or invisible. Colors here match colors.py;
# keep the two in sync if you change either.
[theme]
base = "dark"
primaryColor = "#6366F1"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161A23"
textColor = "#E5E7EB"
font = "sans serif"
